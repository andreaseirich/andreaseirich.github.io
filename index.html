      var key='34a014f3-a4d1-430a-880d-a029d8cd97b9', to='eirichandreas2004@icloud.com';
      form.addEventListener('submit',async function(e){
        e.preventDefault();

          var r=await fetch('https://api.web3forms.com/submit',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({access_key:key,subject:'Contact from '+n,from_name:n,from_email:em,message:m,to:to})});
          var j=await r.json();
          if(j.success){ status.textContent='Message sent. I\'ll get back soon.'; status.className='form-status success'; form.reset(); btn.style.background='linear-gradient(135deg,#2e7d32,#1b5e20)'; setTimeout(function(){ btn.style.background=''; },2000); }
